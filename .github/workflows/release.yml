name: Release Rust Binary

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: linux-aarch64
          - target: x86_64-pc-windows-gnu
            os: ubuntu-latest
            artifact: windows-x86_64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Copy binary
        run: |
          mkdir -p artifacts
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            cp target/\( {{ matrix.target }}/release/Cgfv4D.exe artifacts/cgf-v4d.exe || cp target/ \){{ matrix.target }}/release/*.exe artifacts/cgf-v4d.exe
          else
            cp target/\( {{ matrix.target }}/release/Cgfv4D artifacts/cgf-v4d || cp target/ \){{ matrix.target }}/release/cgf-v4d* artifacts/cgf-v4d || true
          fi
          ls -la artifacts/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cgf-v4d-${{ matrix.artifact }}
          path: artifacts/*
          if-no-files-found: error
